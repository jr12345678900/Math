<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dimension and Area Bounds Drill</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
    .container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    h3 { color: #16a085; margin-top: 0; }
    .problem-box { font-size: 1.1em; margin-bottom: 15px; padding: 15px; background: #e8f8f5; border-radius: 5px; }
    label { font-weight: bold; display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .flex-inputs { display: flex; gap: 10px; }
    button { background: #2980b9; color: white; border: none; padding: 10px; margin-top: 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1em; }
    button:hover { background: #3498db; }
    .btn-new { background: #27ae60; }
    .btn-new:hover { background: #2ecc71; }
    #feedback { margin-top: 15px; font-weight: bold; text-align: center; }
    .correct { color: #27ae60; }
    .incorrect { color: #c0392b; }
</style>
</head>
<body>
<div class="container">
    <h3>Drill: Dimension & Area Bounds</h3>
    <div class="problem-box" id="problemDisplay">Loading...</div>
    
    <label>1. Bounds for the Length:</label>
    <div class="flex-inputs">
        <input type="number" id="inputLowerL" step="any" placeholder="Lower Bound">
        <input type="number" id="inputUpperL" step="any" placeholder="Upper Bound">
    </div>
    
    <label id="areaLabel">2. Calculate Area Bound:</label>
    <input type="number" id="inputArea" step="any" placeholder="Area Bound">

    <button onclick="checkAnswer()">Check Answer</button>
    <button class="btn-new" onclick="generateProblem()">New Problem</button>
    <div id="feedback"></div>
</div>
<script>
    let correctLowerL=0, correctUpperL=0, correctArea=0;
    function generateProblem() {
        let length = Math.floor(Math.random() * 20) + 10;
        let width = Math.floor(Math.random() * 20) + 10;
        let isMax = Math.random() > 0.5; // Ask for max area or min area
        
        let halfUnit = 0.5; // Nearest whole number (unit=1)
        
        correctLowerL = length - halfUnit;
        correctUpperL = length + halfUnit;
        
        if (isMax) {
            correctArea = (length + halfUnit) * (width + halfUnit);
            document.getElementById('areaLabel').innerHTML = `2. Calculate the <strong>MAXIMUM</strong> possible area:`;
        } else {
            correctArea = (length - halfUnit) * (width - halfUnit);
            document.getElementById('areaLabel').innerHTML = `2. Calculate the <strong>MINIMUM</strong> possible area:`;
        }

        document.getElementById('problemDisplay').innerHTML = `A rectangle has Length = <strong>${length} m</strong> and Width = <strong>${width} m</strong>, both measured to the nearest <strong>1 m</strong>.`;
        document.getElementById('inputLowerL').value = ''; 
        document.getElementById('inputUpperL').value = '';
        document.getElementById('inputArea').value = '';
        document.getElementById('feedback').innerHTML = '';
    }
    function checkAnswer() {
        let uLL = parseFloat(document.getElementById('inputLowerL').value);
        let uUL = parseFloat(document.getElementById('inputUpperL').value);
        let uA = parseFloat(document.getElementById('inputArea').value);
        
        if(Math.abs(uLL - correctLowerL) < 0.001 && Math.abs(uUL - correctUpperL) < 0.001 && Math.abs(uA - correctArea) < 0.001) {
            document.getElementById('feedback').innerHTML = "✅ Correct! Great synthesis.";
            document.getElementById('feedback').className = "correct";
        } else {
            document.getElementById('feedback').innerHTML = "❌ Try Again. Remember bounds use +/- 0.5 here.";
            document.getElementById('feedback').className = "incorrect";
        }
    }
    window.onload = generateProblem;
</script>
</body>
</html>
