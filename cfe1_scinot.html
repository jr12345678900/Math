<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Notation & Rounding Drill</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
    .container { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    h3 { color: #d35400; margin-top: 0; }
    .problem-box { font-size: 1.2em; font-weight: bold; margin-bottom: 15px; padding: 10px; background: #e8f4f8; border-radius: 5px; text-align: center; }
    label { font-weight: bold; display: block; margin-top: 10px; }
    input { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .flex-inputs { display: flex; align-items: center; gap: 10px; }
    .flex-inputs input { width: 40%; }
    button { background: #2980b9; color: white; border: none; padding: 10px; margin-top: 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1em; }
    button:hover { background: #3498db; }
    .btn-new { background: #27ae60; }
    .btn-new:hover { background: #2ecc71; }
    #feedback { margin-top: 15px; font-weight: bold; text-align: center; }
    .correct { color: #27ae60; }
    .incorrect { color: #c0392b; }
    .hint { font-size: 0.85em; color: #7f8c8d; font-weight: normal; }
</style>
</head>
<body>
<div class="container">
    <h3>Drill: Sci Notation & Rounding</h3>
    <div class="problem-box" id="problemDisplay">Loading...</div>
    
    <label>1. Scientific Notation <span class="hint" id="aHintLabel"></span></label>
    <div class="flex-inputs">
        <input type="number" id="inputA" step="any" placeholder="a"> 
        <span> &times; 10^ </span>
        <input type="number" id="inputK" placeholder="k">
    </div>
    
    <label id="roundingLabel">2. Rounding:</label>
    <input type="number" id="inputRounded" step="any" placeholder="Rounded value">
    
    <button onclick="checkAnswer()">Check Answer</button>
    <button class="btn-new" onclick="generateProblem()">New Problem</button>
    <div id="feedback"></div>
</div>

<script>
    let correctA = 0;
    let correctK = 0;
    let correctRounded = 0;

    function generateProblem() {
        // Generate a base and exponent
        let base = (Math.random() * 8.999 + 1); 
        let exp = (Math.random() > 0.5) ? -1 * (Math.floor(Math.random() * 3) + 1) : Math.floor(Math.random() * 3) + 1;
        
        // Exact value rounded slightly to avoid deep JS floating point errors
        let exactValue = parseFloat((base * Math.pow(10, exp)).toPrecision(6));
        
        // Determine Rounding Type (50% chance Decimal Places, 50% chance Sig Figs)
        let isDecimalPlace = Math.random() > 0.5;
        let targetRounding = 0;
        let ruleText = "";

        // Calculate Box 2 Answer (Overall Rounded Value)
        if (isDecimalPlace) {
            targetRounding = Math.floor(Math.random() * 3) + 1; // 1 to 3 dp
            correctRounded = parseFloat(exactValue.toFixed(targetRounding));
            ruleText = `${targetRounding} decimal place(s)`;
        } else {
            targetRounding = Math.floor(Math.random() * 2) + 2; // 2 to 3 sf
            correctRounded = parseFloat(exactValue.toPrecision(targetRounding));
            ruleText = `${targetRounding} significant figure(s)`;
        }

        // Calculate Box 1 Answer (Sci Notation where 'a' follows the SAME rule)
        let sciString = exactValue.toExponential(); 
        let parts = sciString.split('e');
        let rawA = parseFloat(parts[0]);
        correctK = parseInt(parts[1].replace('+', ''));

        if (isDecimalPlace) {
            correctA = parseFloat(rawA.toFixed(targetRounding));
        } else {
            correctA = parseFloat(rawA.toPrecision(targetRounding));
        }

        // Update UI
        document.getElementById('problemDisplay').innerHTML = `Exact Value: z = ${exactValue}`;
        document.getElementById('aHintLabel').innerHTML = `(Write 'a' to ${ruleText}):`;
        document.getElementById('roundingLabel').innerHTML = `2. Correct to ${ruleText}:`;
        
        // Clear inputs
        document.getElementById('inputA').value = ''; 
        document.getElementById('inputK').value = ''; 
        document.getElementById('inputRounded').value = '';
        document.getElementById('feedback').innerHTML = '';
    }

    function checkAnswer() {
        let uA = parseFloat(document.getElementById('inputA').value);
        let uK = parseInt(document.getElementById('inputK').value);
        let uRounded = parseFloat(document.getElementById('inputRounded').value);
        
        let aMatch = Math.abs(uA - correctA) < 0.001;
        let kMatch = uK === correctK;
        let roundMatch = Math.abs(uRounded - correctRounded) < 0.0001;

        if (aMatch && kMatch && roundMatch) {
            document.getElementById('feedback').innerHTML = "✅ Correct! Great job.";
            document.getElementById('feedback').className = "correct";
        } else {
            document.getElementById('feedback').innerHTML = "❌ Try Again. Double-check your rounding rules for both boxes.";
            document.getElementById('feedback').className = "incorrect";
        }
    }

    window.onload = generateProblem;
</script>
</body>
</html>
