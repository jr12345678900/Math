<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFE #4 Mega Practice</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
        }
        .app-container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 750px;
            width: 100%;
            border-top: 6px solid #00467F;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .header h2 { margin: 0; color: #00467F; }
        .score-badge {
            background: #e8f4f8;
            color: #00467F;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1em;
        }
        .problem-display {
            font-size: 1.5em;
            text-align: center;
            padding: 20px;
            background: #fff3cd;
            border-radius: 8px;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }
        .question-step {
            margin-bottom: 15px;
            font-size: 1.1em;
            background: #fdfdfe;
            padding: 15px;
            border: 1px solid #e1e4e8;
            border-radius: 5px;
        }
        input[type="text"], input[type="number"] {
            padding: 8px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            width: 70px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        select {
            padding: 8px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            outline: none;
        }
        .correct-input { background-color: #d4edda !important; border-color: #28a745 !important; }
        .incorrect-input { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        
        .controls { text-align: center; margin-top: 25px; }
        button {
            background-color: #00467F;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1em;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            margin: 5px;
        }
        button:hover { background-color: #003057; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #nextBtn { background-color: #28a745; display: none; }
        #nextBtn:hover { background-color: #1e7e34; }
        
        .feedback {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: 15px;
            min-height: 30px;
        }
        
        .fraction { display: inline-block; vertical-align: middle; text-align: center; margin: 0 5px;}
        .numerator { border-bottom: 2px solid #333; padding: 0 5px; }
        .denominator { padding: 0 5px; }
        
        .celebration {
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <div class="header">
        <h2>CFE #4 Mega Practice</h2>
        <div class="score-badge">Score: <span id="scoreVal">0</span> / 10</div>
    </div>
    
    <div id="workspace">
        <div class="problem-display" id="problemText">Loading...</div>
        <div id="stepsContainer"></div>
        
        <div class="feedback" id="feedbackMsg"></div>
        
        <div class="controls">
            <button id="checkBtn" onclick="checkAnswers()">Check Work</button>
            <button id="nextBtn" onclick="loadProblem()">Next Problem &rarr;</button>
        </div>
    </div>

    <div class="celebration" id="celebration">
        <h2>🎉 Awesome Job! 🎉</h2>
        <p>You have successfully completed the practice session. You are ready for the CFE!</p>
        <button onclick="location.reload()">Restart Practice</button>
    </div>
</div>

<script>
    let score = 0;
    let currentAnswers = {};
    let lastType = -1;

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    // --- GENERATORS ---

    function genAbsValue() {
        let A = rand(1, 6);
        let B = rand(2, 8);
        let isGreater = Math.random() > 0.5;
        let sym = isGreater ? ">" : "<";
        let typeAns = isGreater ? "OR" : "AND";
        
        let bound1 = A - B;
        let bound2 = A + B;

        let html = `|x - ${A}| ${sym} ${B}`;
        
        let steps = `
            <div class="question-step">
                1. Does this inequality translate into an AND or an OR statement? 
                <select id="i_type">
                    <option value="">-Select-</option>
                    <option value="AND">AND (Less-th-AND)</option>
                    <option value="OR">OR (Great-OR)</option>
                </select>
            </div>
            <div class="question-step">
                2. Set up your two cases. What are the two boundary numbers? 
                <br><br>Smaller boundary: <input type="number" id="i_b1"> 
                &nbsp;&nbsp; Larger boundary: <input type="number" id="i_b2">
            </div>
        `;
        return { html, steps, ans: { i_type: typeAns, i_b1: bound1, i_b2: bound2 } };
    }

    function genRadical() {
        // sqrt(x+A) = x. => x^2 - x - A = 0
        let sets = [
            {A: 12, v: 4, e: -3}, {A: 6, v: 3, e: -2}, 
            {A: 20, v: 5, e: -4}, {A: 30, v: 6, e: -5}, 
            {A: 2, v: 2, e: -1}
        ];
        let p = sets[rand(0, sets.length-1)];
        
        let html = `&radic;<span style="border-top: 1px solid #333; padding-top:1px;">x + ${p.A}</span> = x`;
        
        let steps = `
            <div class="question-step">
                1. Square both sides and move all terms to one side. Fill in the resulting quadratic equation:
                <br><br> x&sup2; + <input type="number" id="i_b"> x + <input type="number" id="i_c"> = 0
            </div>
            <div class="question-step">
                2. Solve the quadratic and test the answers in the original equation.
                <br><br> Which is the <strong>VALID</strong> solution? x = <input type="number" id="i_v">
                <br><br> Which is the <strong>EXTRANEOUS</strong> solution? x = <input type="number" id="i_e">
            </div>
        `;
        return { html, steps, ans: { i_b: -1, i_c: -p.A, i_v: p.v, i_e: p.e } };
    }

    function genRational() {
        let A = rand(2, 5);
        let isExt = Math.random() > 0.5;
        let B;
        if(isExt) {
            B = Math.random() > 0.5 ? A * 2 : -A * 2;
        } else {
            do { B = rand(2, 12); } while (B === A*2 || B === -A*2 || B % 2 !== 0);
        }
        let ansX = B / 2;
        let status = isExt ? "Extraneous" : "Valid";

        let html = `
            <div class="fraction"><div class="numerator">1</div><div class="denominator">x - ${A}</div></div> + 
            <div class="fraction"><div class="numerator">1</div><div class="denominator">x + ${A}</div></div> = 
            <div class="fraction"><div class="numerator">${B}</div><div class="denominator">x&sup2; - ${A*A}</div></div>
        `;
        
        let steps = `
            <div class="question-step">
                1. What are the two <strong>restricted values</strong> for x? (Domain restrictions)
                <br><br> Smaller: x &ne; <input type="number" id="i_r1"> &nbsp;&nbsp; Larger: x &ne; <input type="number" id="i_r2">
            </div>
            <div class="question-step">
                2. After making a common denominator and solving the numerators, you get:
                <br><br> x = <input type="number" id="i_x">
            </div>
            <div class="question-step">
                3. Based on the restrictions, is your algebraic answer valid or extraneous?
                <select id="i_stat">
                    <option value="">-Select-</option>
                    <option value="Valid">Valid Solution</option>
                    <option value="Extraneous">Extraneous (No Solution)</option>
                </select>
            </div>
        `;
        return { html, steps, ans: { i_r1: -A, i_r2: A, i_x: ansX, i_stat: status } };
    }

    function genDivision() {
        let root = rand(2, 5);
        if (Math.random() > 0.5) root *= -1;
        let c3 = 1; let c2 = 0; let c1 = rand(-6, 6); let c0 = rand(-10, 10);
        let rem = (root*root*root) + (c1*root) + c0;
        let divisor = root > 0 ? `(x - ${root})` : `(x + ${-root})`;
        let dividend = `(x&sup3; ${c1 > 0 ? '+ '+c1 : '- '+Math.abs(c1)}x ${c0 > 0 ? '+ '+c0 : '- '+Math.abs(c0)})`;

        let html = `${dividend} &divide; ${divisor}`;
        
        let steps = `
            <div class="question-step">
                1. What number goes in the synthetic division "box"? (The root)
                <br><br> <input type="number" id="i_root">
            </div>
            <div class="question-step">
                2. What are the FOUR coefficients in the top row of your synthetic division setup? <em>(Watch out for missing terms!)</em>
                <br><br> <input type="number" id="i_c3"> , <input type="number" id="i_c2"> , <input type="number" id="i_c1"> , <input type="number" id="i_c0">
            </div>
            <div class="question-step">
                3. After executing the synthetic division, what is the final remainder?
                <br><br> Remainder = <input type="number" id="i_rem">
            </div>
        `;
        return { html, steps, ans: { i_root: root, i_c3: 1, i_c2: 0, i_c1: c1, i_c0: c0, i_rem: rem } };
    }

    // --- LOGIC ---

    function loadProblem() {
        if (score >= 10) {
            document.getElementById('workspace').style.display = 'none';
            document.getElementById('celebration').style.display = 'block';
            return;
        }

        document.getElementById('checkBtn').style.display = 'inline-block';
        document.getElementById('nextBtn').style.display = 'none';
        document.getElementById('feedbackMsg').innerHTML = '';

        let type;
        do { type = rand(0, 3); } while (type === lastType);
        lastType = type;

        let prob;
        if (type === 0) prob = genAbsValue();
        else if (type === 1) prob = genRadical();
        else if (type === 2) prob = genRational();
        else if (type === 3) prob = genDivision();

        document.getElementById('problemText').innerHTML = prob.html;
        document.getElementById('stepsContainer').innerHTML = prob.steps;
        currentAnswers = prob.ans;
    }

    function checkAnswers() {
        let allCorrect = true;
        let keys = Object.keys(currentAnswers);

        keys.forEach(key => {
            let el = document.getElementById(key);
            let val = el.value.trim().toUpperCase(); // uppercase handles the text dropdowns safely
            let correctVal = currentAnswers[key].toString().toUpperCase();

            el.classList.remove('correct-input', 'incorrect-input');

            if (val === correctVal) {
                el.classList.add('correct-input');
            } else {
                el.classList.add('incorrect-input');
                allCorrect = false;
            }
        });

        let fb = document.getElementById('feedbackMsg');
        if (allCorrect) {
            fb.innerHTML = "<span style='color: #28a745;'>✅ Perfect! Great step-by-step logic.</span>";
            document.getElementById('checkBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-block';
            score++;
            document.getElementById('scoreVal').innerText = score;
        } else {
            fb.innerHTML = "<span style='color: #dc3545;'>❌ Look at the red boxes. Check your signs and rules!</span>";
        }
    }

    // Initialize
    loadProblem();
</script>
</body>
</html>
