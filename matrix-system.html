<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matrix System Solver</title>
<style>
    body { font-family: sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 20px auto; padding: 20px; }
    h2 { color: #0055a4; }
    
    /* Layout for stacking problems */
    .controls { margin-bottom: 20px; text-align: center; }
    .generate-btn { padding: 12px 24px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.2em; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .generate-btn:hover { background-color: #218838; }
    
    .problem-container { border: 2px solid #0055a4; padding: 20px; border-radius: 8px; margin-bottom: 40px; background: #fafafa; }
    .system { font-size: 1.3em; margin-bottom: 20px; padding: 15px; background: #fff; border: 1px solid #ddd; border-radius: 8px; display: inline-block; font-weight: bold;}
    
    .step { display: none; margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fff;}
    .step.active { display: block; }
    .equation-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;}
    
    /* Matrix Styling */
    .matrix { display: grid; gap: 5px; padding: 5px 10px; border-left: 2px solid #333; border-right: 2px solid #333; border-radius: 3px; }
    .matrix-2x2 { grid-template-columns: 1fr 1fr; }
    .matrix-2x1 { grid-template-columns: 1fr; }
    
    input { width: 45px; height: 35px; text-align: center; font-size: 1em; border: 1px solid #ccc; border-radius: 4px; }
    .fraction { display: flex; flex-direction: column; align-items: center; font-size: 1.1em; }
    .fraction input { width: 55px; }
    .frac-line { border-top: 2px solid #333; width: 100%; margin: 2px 0; }
    
    button.check-btn { padding: 8px 16px; background-color: #0055a4; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1em; }
    button.check-btn:hover { background-color: #003d7a; }
    .feedback { font-weight: bold; margin-left: 15px; }
    .correct { color: green; }
    .incorrect { color: red; }
</style>
</head>
<body onload="addProblem()">

    <div class="controls">
        <button class="generate-btn" onclick="addProblem()">+ Generate New Problem</button>
    </div>

    <div id="all-problems"></div>

<script>
    // Store solutions for every problem generated
    const solutions = {};
    let problemCount = 0;

    // Helper to pick random numbers between -9 and 9 (excluding 0)
    function rand() {
        let val;
        do { val = Math.floor(Math.random() * 19) - 9; } while(val === 0);
        return val;
    }

    function addProblem() {
        problemCount++;
        let pId = problemCount;

        let a11, a12, a21, a22, det, x, y, b1, b2;
        
        // Pick coefficients ensuring the determinant is never 0
        do {
            a11 = rand(); a12 = rand();
            a21 = rand(); a22 = rand();
            det = a11 * a22 - a12 * a21;
        } while(det === 0);

        // Pick random integer solutions
        x = rand();
        y = rand();

        // Calculate the required B matrix values
        b1 = a11 * x + a12 * y;
        b2 = a21 * x + a22 * y;

        // Pre-calculate all correct answers for the steps
        let adj11 = a22, adj12 = -a12, adj21 = -a21, adj22 = a11;
        let m1 = adj11 * b1 + adj12 * b2;
        let m2 = adj21 * b1 + adj22 * b2;

        solutions[pId] = {
            a11, a12, a21, a22, b1, b2, det,
            adj11, adj12, adj21, adj22, m1, m2, x, y
        };

        // Format equations cleanly (handling double negative signs)
        let sign1 = a12 < 0 ? "-" : "+";
        let sign2 = a22 < 0 ? "-" : "+";
        let eq1 = `${a11}x ${sign1} ${Math.abs(a12)}y = ${b1}`;
        let eq2 = `${a21}x ${sign2} ${Math.abs(a22)}y = ${b2}`;

        // Build the HTML for the new problem
        let html = `
        <div class="problem-container" id="prob-${pId}">
            <h2>Problem #${pId}</h2>
            <div class="system">
                ${eq1}<br>
                ${eq2}
            </div>

            <div id="step1-${pId}" class="step active">
                <h3>Step 1: Set up the matrix equation (AX = B)</h3>
                <div class="equation-row">
                    <div class="matrix matrix-2x2">
                        <input type="number" id="a11-${pId}"> <input type="number" id="a12-${pId}">
                        <input type="number" id="a21-${pId}"> <input type="number" id="a22-${pId}">
                    </div>
                    <div> * </div>
                    <div class="matrix matrix-2x1"><div>x</div><div>y</div></div>
                    <div> = </div>
                    <div class="matrix matrix-2x1">
                        <input type="number" id="b1-${pId}"> <input type="number" id="b2-${pId}">
                    </div>
                </div>
                <button class="check-btn" onclick="checkStep1(${pId})">Check Step 1</button>
                <span id="feed1-${pId}" class="feedback"></span>
            </div>

            <div id="step2-${pId}" class="step">
                <h3>Step 2: Isolate X using the Inverse (1/det * Adjugate)</h3>
                <div class="equation-row">
                    <div class="matrix matrix-2x1"><div>x</div><div>y</div></div>
                    <div> = </div>
                    <div class="fraction">
                        <span>1</span><div class="frac-line"></div>
                        <input type="number" id="det-${pId}" placeholder="det">
                    </div>
                    <div class="matrix matrix-2x2">
                        <input type="number" id="adj11-${pId}"> <input type="number" id="adj12-${pId}">
                        <input type="number" id="adj21-${pId}"> <input type="number" id="adj22-${pId}">
                    </div>
                    <div> * </div>
                    <div class="matrix matrix-2x1"><div>${b1}</div><div>${b2}</div></div>
                </div>
                <button class="check-btn" onclick="checkStep2(${pId})">Check Step 2</button>
                <span id="feed2-${pId}" class="feedback"></span>
            </div>

            <div id="step3-${pId}" class="step">
                <h3>Step 3: Multiply the Adjugate by Matrix B</h3>
                <div class="equation-row">
                    <div class="matrix matrix-2x1"><div>x</div><div>y</div></div>
                    <div> = </div>
                    <div class="fraction">
                        <span>1</span><div class="frac-line"></div><span>${det}</span>
                    </div>
                    <div class="matrix matrix-2x1">
                        <input type="number" id="m1-${pId}"> <input type="number" id="m2-${pId}">
                    </div>
                </div>
                <button class="check-btn" onclick="checkStep3(${pId})">Check Step 3</button>
                <span id="feed3-${pId}" class="feedback"></span>
            </div>

            <div id="step4-${pId}" class="step">
                <h3>Step 4: Final Solution (Multiply by the scalar)</h3>
                <div class="equation-row">
                    <div class="matrix matrix-2x1"><div>x</div><div>y</div></div>
                    <div> = </div>
                    <div class="matrix matrix-2x1">
                        <input type="number" id="x-${pId}"> <input type="number" id="y-${pId}">
                    </div>
                </div>
                <button class="check-btn" onclick="checkStep4(${pId})">Check Step 4</button>
                <span id="feed4-${pId}" class="feedback"></span>
            </div>
        </div>
        `;

        // Inject the HTML into the page
        document.getElementById('all-problems').insertAdjacentHTML('afterbegin', html);
    }

    // --- Verification Functions ---
    function checkStep1(pId) {
        let s = solutions[pId];
        let a11 = parseInt(document.getElementById(`a11-${pId}`).value);
        let a12 = parseInt(document.getElementById(`a12-${pId}`).value);
        let a21 = parseInt(document.getElementById(`a21-${pId}`).value);
        let a22 = parseInt(document.getElementById(`a22-${pId}`).value);
        let b1 = parseInt(document.getElementById(`b1-${pId}`).value);
        let b2 = parseInt(document.getElementById(`b2-${pId}`).value);
        
        if(a11 === s.a11 && a12 === s.a12 && a21 === s.a21 && a22 === s.a22 && b1 === s.b1 && b2 === s.b2) {
            document.getElementById(`feed1-${pId}`).innerHTML = "Correct!";
            document.getElementById(`feed1-${pId}`).className = "feedback correct";
            document.getElementById(`step2-${pId}`).classList.add('active');
        } else {
            document.getElementById(`feed1-${pId}`).innerHTML = "Incorrect, try again.";
            document.getElementById(`feed1-${pId}`).className = "feedback incorrect";
        }
    }

    function checkStep2(pId) {
        let s = solutions[pId];
        let det = parseInt(document.getElementById(`det-${pId}`).value);
        let a11 = parseInt(document.getElementById(`adj11-${pId}`).value);
        let a12 = parseInt(document.getElementById(`adj12-${pId}`).value);
        let a21 = parseInt(document.getElementById(`adj21-${pId}`).value);
        let a22 = parseInt(document.getElementById(`adj22-${pId}`).value);
        
        if(det === s.det && a11 === s.adj11 && a12 === s.adj12 && a21 === s.adj21 && a22 === s.adj22) {
            document.getElementById(`feed2-${pId}`).innerHTML = "Correct!";
            document.getElementById(`feed2-${pId}`).className = "feedback correct";
            document.getElementById(`step3-${pId}`).classList.add('active');
        } else {
            document.getElementById(`feed2-${pId}`).innerHTML = "Incorrect, try again.";
            document.getElementById(`feed2-${pId}`).className = "feedback incorrect";
        }
    }

    function checkStep3(pId) {
        let s = solutions[pId];
        let m1 = parseInt(document.getElementById(`m1-${pId}`).value);
        let m2 = parseInt(document.getElementById(`m2-${pId}`).value);
        
        if(m1 === s.m1 && m2 === s.m2) {
            document.getElementById(`feed3-${pId}`).innerHTML = "Correct!";
            document.getElementById(`feed3-${pId}`).className = "feedback correct";
            document.getElementById(`step4-${pId}`).classList.add('active');
        } else {
            document.getElementById(`feed3-${pId}`).innerHTML = "Incorrect, try again.";
            document.getElementById(`feed3-${pId}`).className = "feedback incorrect";
        }
    }

    function checkStep4(pId) {
        let s = solutions[pId];
        let x = parseInt(document.getElementById(`x-${pId}`).value);
        let y = parseInt(document.getElementById(`y-${pId}`).value);
        
        if(x === s.x && y === s.y) {
            document.getElementById(`feed4-${pId}`).innerHTML = "Correct! You solved the system.";
            document.getElementById(`feed4-${pId}`).className = "feedback correct";
        } else {
            document.getElementById(`feed4-${pId}`).innerHTML = "Incorrect, try again.";
            document.getElementById(`feed4-${pId}`).className = "feedback incorrect";
        }
    }
</script>
</body>
</html>
