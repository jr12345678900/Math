<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polynomial Features Practice</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 650px; width: 100%; border-top: 5px solid #00467F; }
        .problem-text { font-size: 1.5em; margin-bottom: 20px; padding: 15px; background: #fff3cd; border-radius: 8px; text-align: center; letter-spacing: 1px; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.9em; color: #555; }
        select, input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; }
        .button-row { text-align: center; margin-top: 20px; }
        button { background-color: #00467F; color: white; border: none; padding: 10px 20px; font-size: 1.1em; border-radius: 5px; cursor: pointer; transition: 0.2s; margin: 5px; }
        button:hover { background-color: #003057; }
        .feedback { margin-top: 15px; font-size: 1.2em; font-weight: bold; text-align: center; min-height: 30px; }
        .correct { color: #28a745; }
        .incorrect { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0; color:#00467F; text-align:center;">End Behavior & Multiplicity</h2>
    <p style="text-align:center;">Analyze the factored polynomial to determine its features.</p>
    
    <div class="problem-text" id="problemDisplay">Loading...</div>
    
    <div class="grid-container">
        <div class="input-group">
            <label>Degree is:</label>
            <select id="degree">
                <option value="">--Select--</option>
                <option value="even">Even</option>
                <option value="odd">Odd</option>
            </select>
        </div>
        <div class="input-group">
            <label>Leading Coefficient is:</label>
            <select id="lc">
                <option value="">--Select--</option>
                <option value="pos">Positive</option>
                <option value="neg">Negative</option>
            </select>
        </div>
        <div class="input-group">
            <label>As x &rarr; &infin;, y &rarr; :</label>
            <select id="rightEnd">
                <option value="">--Select--</option>
                <option value="inf">+&infin;</option>
                <option value="ninf">-&infin;</option>
            </select>
        </div>
        <div class="input-group">
            <label>As x &rarr; -&infin;, y &rarr; :</label>
            <select id="leftEnd">
                <option value="">--Select--</option>
                <option value="inf">+&infin;</option>
                <option value="ninf">-&infin;</option>
            </select>
        </div>
        <div class="input-group" style="grid-column: span 2;">
            <label>List all x-intercepts (comma separated):</label>
            <input type="text" id="roots" placeholder="e.g. 2, -3">
        </div>
    </div>

    <div class="button-row">
        <button onclick="checkAnswer()">Check Answer</button>
        <button onclick="generateProblem()" style="background-color: #6c757d;">New Problem</button>
    </div>
    
    <div class="feedback" id="feedbackMsg"></div>
</div>

<script>
    let currentAns = {};

    function generateProblem() {
        document.getElementById('degree').value = '';
        document.getElementById('lc').value = '';
        document.getElementById('rightEnd').value = '';
        document.getElementById('leftEnd').value = '';
        document.getElementById('roots').value = '';
        document.getElementById('feedbackMsg').textContent = '';

        let lcSign = Math.random() > 0.5 ? 1 : -1;
        let aStr = lcSign === 1 ? "" : "-";

        let r1 = Math.floor(Math.random() * 9) - 4; // -4 to 4
        let r2;
        do { r2 = Math.floor(Math.random() * 9) - 4; } while (r2 === r1);

        let m1 = Math.floor(Math.random() * 2) + 1; // 1 or 2
        let m2 = Math.floor(Math.random() * 2) + 1;
        
        let totalDegree = m1 + m2;
        let isEven = (totalDegree % 2 === 0);

        currentAns = {
            deg: isEven ? "even" : "odd",
            lc: lcSign === 1 ? "pos" : "neg",
            rEnd: lcSign === 1 ? "inf" : "ninf",
            lEnd: (lcSign === 1 && isEven) || (lcSign === -1 && !isEven) ? "inf" : "ninf",
            roots: [r1, r2].sort((a,b)=>a-b)
        };

        let factor1 = `(x ${r1 < 0 ? '+' : '-'} ${Math.abs(r1)})` + (m1 > 1 ? `<sup>${m1}</sup>` : '');
        let factor2 = `(x ${r2 < 0 ? '+' : '-'} ${Math.abs(r2)})` + (m2 > 1 ? `<sup>${m2}</sup>` : '');

        document.getElementById('problemDisplay').innerHTML = `f(x) = ${aStr}${factor1}${factor2}`;
    }

    function checkAnswer() {
        let uDeg = document.getElementById('degree').value;
        let uLc = document.getElementById('lc').value;
        let uREnd = document.getElementById('rightEnd').value;
        let uLEnd = document.getElementById('leftEnd').value;
        let uRoots = document.getElementById('roots').value.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n)).sort((a,b)=>a-b);

        let fb = document.getElementById('feedbackMsg');

        if (!uDeg || !uLc || !uREnd || !uLEnd || uRoots.length === 0) {
            fb.textContent = "Please complete all fields.";
            fb.className = "feedback incorrect";
            return;
        }

        let rootsCorrect = JSON.stringify(uRoots) === JSON.stringify(currentAns.roots);

        if (uDeg === currentAns.deg && uLc === currentAns.lc && uREnd === currentAns.rEnd && uLEnd === currentAns.lEnd && rootsCorrect) {
            fb.textContent = "✅ Correct! Excellent analysis.";
            fb.className = "feedback correct";
        } else {
            fb.textContent = "❌ Something is off. Check your degree parity and sign limits.";
            fb.className = "feedback incorrect";
        }
    }

    generateProblem();
</script>
</body>
</html>
