<!DOCTYPE html>
<html>
<head>
    <title>Skill 1: Hypotheses</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #ffffff; color: #333; padding: 15px; }
        .card { background: #f9f9f9; padding: 20px; border-radius: 8px; border-left: 5px solid #004080; }
        select, button { padding: 10px; font-size: 16px; margin-top: 10px; border-radius: 5px; }
        button { background-color: #004080; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #003060; }
        .feedback { font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h3 style="margin-top: 0; color: #004080;">Skill 1: Name that Tail!</h3>
        <p id="scenario-text" style="font-size: 16px; min-height: 50px;"></p>
        
        <label><strong>1. How many tails?</strong></label><br>
        <select id="tail-select">
            <option value="none">-- Select --</option>
            <option value="1">One-Tailed Test</option>
            <option value="2">Two-Tailed Test</option>
        </select><br><br>

        <label><strong>2. Which Alternative Hypothesis (H₁)?</strong></label><br>
        <select id="hyp-select">
            <option value="none">-- Select --</option>
            <option value="neq">μ₁ ≠ μ₂</option>
            <option value="gt">μ₁ > μ₂</option>
            <option value="lt">μ₁ < μ₂</option>
        </select><br><br>

        <button onclick="checkAnswers()">Check Answer</button>
        <button onclick="loadScenario()" style="background-color: #d9534f;">New Scenario</button>
        <div id="feedback" class="feedback"></div>
    </div>

    <script>
        const scenarios = [
            { text: "A biologist wants to know if there is <b>any difference</b> in the weight of male lions (μ₁) versus female lions (μ₂).", tail: "2", hyp: "neq" },
            { text: "A coach claims the track team (μ₁) runs the 100m sprint <b>faster (in fewer seconds)</b> than the swim team (μ₂).", tail: "1", hyp: "lt" },
            { text: "A bakery tests a new oven to see if it bakes bread <b>heavier</b> than the old oven. The new oven is μ₁.", tail: "1", hyp: "gt" },
            { text: "A factory measures the battery life of Phone A (μ₁) and Phone B (μ₂) to see if they are <b>unequal</b>.", tail: "2", hyp: "neq" },
            { text: "A tutor claims his students (μ₁) score <b>higher</b> on the SAT than students who don't use a tutor (μ₂).", tail: "1", hyp: "gt" }
        ];

        let current = {};

        function loadScenario() {
            current = scenarios[Math.floor(Math.random() * scenarios.length)];
            document.getElementById("scenario-text").innerHTML = current.text;
            document.getElementById("tail-select").value = "none";
            document.getElementById("hyp-select").value = "none";
            document.getElementById("feedback").innerHTML = "";
        }

        function checkAnswers() {
            let t = document.getElementById("tail-select").value;
            let h = document.getElementById("hyp-select").value;
            let msg = "";

            if (t === "none" || h === "none") {
                msg = "<span style='color: orange;'>Please answer both drop-downs.</span>";
            } else if (t === current.tail && h === current.hyp) {
                msg = "<span style='color: green;'>✅ Perfect! You identified the correct test and hypothesis.</span>";
            } else {
                msg = "<span style='color: red;'>❌ Not quite. Look closely at the bolded words in the scenario!</span>";
            }
            document.getElementById("feedback").innerHTML = msg;
        }

        window.onload = loadScenario;
    </script>
</body>
</html>
