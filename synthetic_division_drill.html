<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synthetic Division Practice</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; border-top: 5px solid #00467F; }
        .problem-text { font-size: 1.4em; margin-bottom: 20px; padding: 15px; background: #e8f4f8; border-radius: 8px; font-style: italic; }
        .input-group { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px; font-size: 1.2em; flex-wrap: wrap; }
        input[type="number"] { width: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 1em; text-align: center; }
        button { background-color: #00467F; color: white; border: none; padding: 10px 20px; font-size: 1.1em; border-radius: 5px; cursor: pointer; transition: 0.2s; margin: 5px; }
        button:hover { background-color: #003057; }
        .feedback { margin-top: 15px; font-size: 1.2em; font-weight: bold; min-height: 30px; }
        .correct { color: #28a745; }
        .incorrect { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0; color:#00467F;">Synthetic Division Drill</h2>
    <p>Divide the following polynomials. Enter the coefficients of the quotient and the remainder.</p>
    
    <div class="problem-text" id="problemDisplay">Loading...</div>
    
    <div class="input-group">
        <input type="number" id="q2" placeholder="x²"> x² + 
        <input type="number" id="q1" placeholder="x"> x + 
        <input type="number" id="q0" placeholder="C"> 
        <span style="margin-left: 15px;">R:</span>
        <input type="number" id="rem" placeholder="Rem">
    </div>

    <button onclick="checkAnswer()">Check Answer</button>
    <button onclick="generateProblem()" style="background-color: #6c757d;">New Problem</button>
    
    <div class="feedback" id="feedbackMsg"></div>
</div>

<script>
    let currentAns = {};

    function formatTerm(coef, power, isFirst) {
        if (coef === 0) return "";
        let term = "";
        if (coef < 0) term += isFirst ? "-" : " - ";
        else if (!isFirst) term += " + ";
        
        let absCoef = Math.abs(coef);
        if (absCoef !== 1 || power === 0) term += absCoef;
        if (power > 0) term += "x";
        if (power > 1) term += "<sup>" + power + "</sup>";
        return term;
    }

    function generateProblem() {
        // Clear inputs
        document.getElementById('q2').value = '';
        document.getElementById('q1').value = '';
        document.getElementById('q0').value = '';
        document.getElementById('rem').value = '';
        document.getElementById('feedbackMsg').textContent = '';

        // Generate Divisor root (x - a) -> root is 'a'
        let a = Math.floor(Math.random() * 9) - 4; // -4 to 4
        if (a === 0) a = 2; 

        // Generate Quotient coefficients and Remainder
        let q2 = Math.floor(Math.random() * 5) + 1; // 1 to 5 (keep positive for simplicity)
        if (Math.random() > 0.5) q2 *= -1;
        let q1 = Math.floor(Math.random() * 11) - 5;
        let q0 = Math.floor(Math.random() * 11) - 5;
        let r = Math.floor(Math.random() * 21) - 10;

        currentAns = { q2, q1, q0, r };

        // Calculate Dividend coefficients: P(x) = (x-a)(q2*x^2 + q1*x + q0) + r
        let c3 = q2;
        let c2 = q1 - a * q2;
        let c1 = q0 - a * q1;
        let c0 = r - a * q0;

        let dividendStr = formatTerm(c3, 3, true) + formatTerm(c2, 2, false) + formatTerm(c1, 1, false) + formatTerm(c0, 0, false);
        let divisorStr = formatTerm(1, 1, true) + formatTerm(-a, 0, false);

        document.getElementById('problemDisplay').innerHTML = `(${dividendStr}) &divide; (${divisorStr})`;
    }

    function checkAnswer() {
        let uQ2 = parseInt(document.getElementById('q2').value);
        let uQ1 = parseInt(document.getElementById('q1').value);
        let uQ0 = parseInt(document.getElementById('q0').value);
        let uR = parseInt(document.getElementById('rem').value);

        let fb = document.getElementById('feedbackMsg');
        
        if (isNaN(uQ2) || isNaN(uQ1) || isNaN(uQ0) || isNaN(uR)) {
            fb.textContent = "Please fill in all boxes.";
            fb.className = "feedback incorrect";
            return;
        }

        if (uQ2 === currentAns.q2 && uQ1 === currentAns.q1 && uQ0 === currentAns.q0 && uR === currentAns.r) {
            fb.textContent = "✅ Correct! Great job.";
            fb.className = "feedback correct";
        } else {
            fb.textContent = "❌ Not quite. Check your synthetic division steps.";
            fb.className = "feedback incorrect";
        }
    }

    // Init
    generateProblem();
</script>
</body>
</html>
